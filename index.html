<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mariage Georges & Yara</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f8f5f2;
  text-align: center;
  padding: 50px;
}
.container {
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  max-width: 600px;
  margin: auto;
}
button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.confirm {
  background-color: #c8a96a;
  color: white;
}
.decline {
  background-color: #999;
  color: white;
}
</style>
</head>
<body>

<div class="container">
<h1>Georges & Yara 🤍</h1>

<div id="message"></div>

<button class="confirm" onclick="confirmAttendance()">Je confirme ma présence</button>
<button class="decline" onclick="declineAttendance()">Je ne pourrai pas venir</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const guests = params.get("guests");

if(name && guests){
  document.getElementById("message").innerHTML =
  "<p>Chère <b>" + name + "</b>,</p>" +
  "<p>Nous avons le plaisir de vous réserver <b>" + guests + "</b> place(s) pour célébrer notre mariage.</p>";
} else {
  document.getElementById("message").innerHTML =
  "<p>Bienvenue sur notre page de confirmation 🤍</p>";
}

function confirmAttendance() {
  alert("Merci pour votre confirmation 🤍");
}

function declineAttendance() {
  alert("Merci de nous avoir informés.");
}
</script>

</body>
</html>
